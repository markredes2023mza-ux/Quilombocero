<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quilombo cero</title>
<!-- Cliente de Supabase (supabase-js v2) por CDN. Compatible con claves sb_publishable_... -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- jsPDF para generar reportes en PDF desde el navegador -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Tipografías Boox: Baloo 2 (títulos, redondeada) + Inter (texto de trabajo) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Identidad Boox: blanco limpio + negro fuerte + rosa fucsia chicle */
  --paper:#FFF4F9; --card:#FFFFFF; --ink:#141118; --soft:#73707A; --line:#F0E2EB;
  --primary:#F5108B; --primary-soft:#FFE2F1;
  --problema:#E03A2E; --problema-bg:#FCE5E1;
  --atencion:#D98A00; --atencion-bg:#FBEFD3;
  --bien:#28A86B; --bien-bg:#E2F6EC;
  --jose:#6C5CE7; --mimi:#E84393;
  --cal-hotel:#3E6E8E; --cal-hotel-bg:#E4EEF3; --cal-ingles:#8E5A86; --cal-ingles-bg:#F0E6EE;
  --cal-grandbar:#2E7D6B; --cal-grandbar-bg:#E1F0EB; --cal-mika:#C26A2B; --cal-mika-bg:#F6E8DA; --cal-otro:#6E6A86; --cal-otro-bg:#ECEAF2;
  --head:"Baloo 2",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper)}
body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
h1,h2{margin:0;font-family:var(--head);font-weight:700;letter-spacing:-.01em}
p{margin:0}
svg{display:inline-block;vertical-align:middle;flex:none}
/* Títulos y marca con la fuente redondeada de personalidad */
.card-title,.cli-name,.proj-name,.att-name,.cal-range,.rec-name,.top-brand strong,.boox-fallback,.vis-count{font-family:var(--head);font-weight:600}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 90% at 50% -10%,var(--primary-soft) 0%,var(--paper) 55%)}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:38px 32px 34px;width:100%;max-width:420px;box-shadow:0 18px 50px -20px rgba(245,16,139,.30)}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:26px}
/* En el login: logo Boox grande y centrado, de bienvenida */
.brand.brand-login{flex-direction:column;text-align:center;gap:12px;margin-bottom:28px}
.boox-logo{height:58px;width:auto;display:block;object-fit:contain}
.brand.brand-login .boox-logo{height:84px;margin:0 auto 4px}
.boox-fallback{display:none;font-family:var(--head);font-weight:800;color:var(--primary);letter-spacing:-.02em;line-height:1}
.boox-fallback.show{display:inline-block}
.brand.brand-login .boox-fallback{font-size:46px;margin-bottom:2px}
.top-brand .boox-fallback{font-size:20px}
.brand-dot{width:34px;height:34px;border-radius:11px;background:var(--primary);position:relative;flex:none}
.brand-dot::after{content:"";position:absolute;inset:9px;border-radius:5px;background:var(--card)}
.brand-dot.small{width:22px;height:22px;border-radius:7px}
.brand-dot.small::after{inset:6px;border-radius:3px}
.brand h1{font-size:24px}
.brand-sub{color:var(--soft);font-size:13px;margin-top:2px}
.login-q{font-size:15px;margin-bottom:14px;font-weight:500}
.prof-row{display:flex;gap:12px}
.prof-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 10px;background:#fff;border:1.5px solid var(--line);border-radius:16px;font-size:15px;font-weight:600;transition:.15s}
.prof-btn:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 10px 22px -14px rgba(245,16,139,.5)}
.prof-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
.pw-box{display:flex;flex-direction:column;gap:12px}
.back{align-self:flex-start;background:none;border:none;color:var(--soft);font-size:13px;padding:0}
.pw-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.pw-in{padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;font-size:15px;outline:none;transition:border-color .15s}
.pw-in:focus{border-color:var(--primary)}
.pw-err{color:var(--problema);font-size:13px}
.hint{color:var(--soft);font-size:12px;line-height:1.5}
.primary-btn{background:var(--primary);color:#fff;border:none;border-radius:13px;padding:12px 16px;font-size:15px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 8px 18px -10px rgba(245,16,139,.7);transition:.15s}
.primary-btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.primary-btn:disabled{opacity:.6;cursor:default;box-shadow:none;transform:none}
.primary-btn.sm{padding:10px 12px}

.app{max-width:860px;margin:0 auto;padding:0 16px 60px}
.top{display:flex;align-items:center;justify-content:space-between;padding:18px 2px 14px}
.top-brand{display:flex;align-items:center;gap:9px;font-size:16px}
.boox-logo.small{height:26px}
.top-right{display:flex;align-items:center;gap:10px}
.who{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:600;padding:5px 11px 5px 5px;border:1px solid var(--line);border-radius:30px;background:var(--card)}
.who-av{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.av{position:relative;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;overflow:hidden;color:#fff;font-weight:700;font-family:var(--head);flex:none;line-height:1}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.av .av-ini{position:relative}
.ic-btn{background:#fff;border:1px solid var(--line);border-radius:10px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink);transition:.15s}
.ic-btn:hover{border-color:var(--primary);color:var(--primary)}
.ic-btn.sm{width:28px;height:28px;font-size:16px;line-height:1}
.ic-btn.faint{border:none;background:none;color:var(--soft);width:26px;height:26px}
.ic-btn.faint:hover{color:var(--primary)}
.ic-btn.good{color:var(--bien);border-color:var(--bien)}
.ic-btn.good:hover{color:var(--bien);border-color:var(--bien)}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap}
.tab{display:inline-flex;align-items:center;gap:7px;background:none;border:none;padding:11px 14px;font-size:14.5px;color:var(--soft);border-bottom:2.5px solid transparent;margin-bottom:-1px;font-weight:600;border-radius:10px 10px 0 0;transition:.15s}
.tab:hover{color:var(--ink);background:var(--primary-soft)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}
.tab.on:hover{background:none}

.main{display:flex;flex-direction:column;gap:18px}

.hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;border-left:4px solid var(--atencion)}
.hero-head{display:flex;align-items:center;gap:9px;color:var(--atencion);margin-bottom:4px}
.hero-head h2{font-size:18px;color:var(--ink)}
.att-list{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:10px}
.att{display:flex;align-items:stretch;gap:0;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.15s}
.att:hover{box-shadow:0 8px 20px -14px rgba(20,17,24,.35)}
.att-bar{width:4px;flex:none}
.att.lvl3 .att-bar{background:var(--problema)} .att.lvl2 .att-bar{background:var(--atencion)} .att.lvl1 .att-bar{background:var(--soft)}
.att-body{flex:1;padding:12px 14px;min-width:0}
.att-top{display:flex;align-items:center;gap:8px}
.att-name{font-weight:600;font-size:15px}
.att-reasons{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.reason{font-size:12.5px;color:var(--soft);background:var(--paper);padding:3px 9px;border-radius:20px}
.att.lvl3 .reason:first-child{color:var(--problema);background:var(--problema-bg)}
.att-action{flex:none;align-self:center;margin-right:12px;background:var(--primary-soft);color:var(--primary);border:none;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;white-space:nowrap;transition:.15s}
.att-action:hover{background:var(--primary);color:#fff}

.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 6px 24px -18px rgba(20,17,24,.30)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
.card-title{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:16px}
.card-sub{color:var(--soft);font-size:13px}
.card-note{color:var(--soft);font-size:13px;line-height:1.55;margin:6px 0 14px}
.link-btn{background:none;border:none;color:var(--primary);font-size:13px;font-weight:500;padding:0}
.empty{color:var(--soft);font-size:14px;padding:8px 2px;list-style:none}
.good-empty{color:var(--bien)}

.capture{display:flex;gap:8px;margin-bottom:12px}
.capture input{flex:1;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:14.5px;outline:none}
.capture input:focus{border-color:var(--primary)}
.inbox{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
.inbox li{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:9px;font-size:14.5px}
.inbox li:hover{background:var(--paper)}
.inbox li.done span{text-decoration:line-through;color:var(--soft)}
.inbox li span{flex:1}
.check{background:none;border:none;color:var(--primary);padding:0;display:flex}
.inbox li.done .check,.rec-list li.done .check{color:var(--bien)}

.rec-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
.rec-list li{display:flex;align-items:flex-start;gap:11px;padding:11px 6px;border-radius:10px}
.rec-list li:hover{background:var(--paper)}
.rec-list li.done .rec-name{text-decoration:line-through;color:var(--soft)}
.rec-body{display:flex;flex-direction:column;gap:2px}
.rec-name{font-size:15px;font-weight:500}
.rec-note{font-size:12.5px;color:var(--soft);line-height:1.45}

.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.proj{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;transition:.15s}
.proj:hover{box-shadow:0 10px 24px -18px rgba(245,16,139,.5)}
.proj-name{font-weight:600;font-size:14.5px;margin-bottom:10px}
.bar{height:8px;background:var(--primary-soft);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#FF5FB0,var(--primary));border-radius:6px;transition:width .25s}
.proj-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.step-grp{display:flex;align-items:center;gap:10px}
.pct{font-size:13px;font-weight:600;min-width:34px;text-align:center}
.proj-next{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.proj-next .lbl,.cycle .lbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);margin-bottom:5px}
.subs{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:1px}
.subs li{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 2px}
.subs li.done span{text-decoration:line-through;color:var(--soft)}
.subs li.done .check{color:var(--bien)}
.subs .check{flex:none}
.subs li span{flex:1}
.sub-del{background:none;border:none;color:var(--soft);cursor:pointer;display:flex;padding:1px;opacity:.45}
.sub-del:hover{opacity:1}
.add-sub{display:flex;gap:6px;margin-top:8px}
.add-sub input{flex:1;min-width:0;padding:7px 9px;border:1.5px solid var(--line);border-radius:8px;font-size:12.5px;outline:none}
.add-sub input:focus{border-color:var(--primary)}
.ghost-btn.sm{padding:7px 10px}
.proj-due{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:12.5px}
.proj-due .lbl2{text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:var(--soft)}
.due-in{padding:5px 8px;border:1.5px solid var(--line);border-radius:8px;font-size:12.5px;background:#fff;color:var(--ink);font-family:inherit}
.due-in:focus{outline:none;border-color:var(--primary)}
.due-badge{font-weight:600}
.due-badge.warn{color:var(--atencion)}
.due-badge.danger{color:var(--problema)}

.cli-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
.cli{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;border-top:3px solid var(--line);transition:.15s}
.cli:hover{box-shadow:0 10px 24px -18px rgba(20,17,24,.35)}
.cli.estado-problema{border-top-color:var(--problema)}
.cli.estado-atencion{border-top-color:var(--atencion)}
.cli.estado-bien{border-top-color:var(--bien)}
.cli-top{display:flex;align-items:center;justify-content:space-between}
.cli-name{font-weight:600;font-size:16px}
.cli-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.chip{font-size:11.5px;background:var(--paper);color:var(--soft);padding:3px 9px;border-radius:20px;font-weight:500}
.chip.warn{background:var(--atencion-bg);color:var(--atencion)}
.chip.ghost{background:transparent;border:1px solid var(--line)}
.estado-pills{display:flex;gap:5px;margin-bottom:12px}
.pill{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:6px 4px;font-size:12px;font-weight:600;color:var(--soft);transition:.15s}
.pill:hover{border-color:var(--soft)}
.pill.on.p-bien{background:var(--bien-bg);color:var(--bien);border-color:var(--bien)}
.pill.on.p-atencion{background:var(--atencion-bg);color:var(--atencion);border-color:var(--atencion)}
.pill.on.p-problema{background:var(--problema-bg);color:var(--problema);border-color:var(--problema)}
.cycle{background:var(--paper);border-radius:10px;padding:11px 12px;margin-bottom:12px}
.cycle-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.cyc{font-size:12px;padding:4px 9px;border-radius:7px;background:#fff;border:1px solid var(--line);color:var(--soft)}
.cyc.active{color:var(--bien);border-color:var(--bien);background:var(--bien-bg)}
.cyc.active.danger{color:var(--problema);border-color:var(--problema);background:var(--problema-bg)}
.arrow{color:var(--soft);font-size:13px}
.vis-row{display:flex;align-items:center;gap:12px}
.vis-count{font-size:13.5px;font-weight:500}
.cli-note{font-size:13.5px;color:var(--ink);line-height:1.5}
.cli-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;font-family:var(--head)}
.cli-badge.p-bien{background:var(--bien-bg);color:var(--bien)}
.cli-badge.p-atencion{background:var(--atencion-bg);color:var(--atencion)}
.cli-badge.p-problema{background:var(--problema-bg);color:var(--problema)}
.cli-note-short{font-size:13px;color:var(--soft);line-height:1.45;margin:2px 0 12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cli-note-short.empty-note{font-style:italic}
.cli-ver{width:100%;justify-content:center}
.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dash-box{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;text-align:center}
.dash-lbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--soft);margin-bottom:4px}
.dash-num{font-family:var(--head);font-weight:700;font-size:18px}
.cobro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
.cobro{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;border-top:3px solid var(--line);transition:.15s}
.cobro.estado-bien{border-top-color:var(--bien)} .cobro.estado-atencion{border-top-color:var(--atencion)} .cobro.estado-problema{border-top-color:var(--problema)}
.cobro:hover{box-shadow:0 10px 24px -18px rgba(20,17,24,.35)}
.cobro-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.cobro-name{font-family:var(--head);font-weight:600;font-size:15.5px}
.cobro-prox{font-size:13px;color:var(--ink);margin:8px 0}
.cobro-parte{font-size:13px;color:var(--soft);margin-bottom:8px}
.cobro-actions{margin:8px 0}
.cobro-acc{display:flex;flex-direction:column;gap:8px}
.cobro-inline{display:flex;gap:6px}
.cobro-inline .bit-in{margin:0;flex:1;min-width:0}
.cobro-ok{display:inline-flex;align-items:center;gap:5px;color:var(--bien);font-weight:600;font-size:13.5px}
.cobro-hist{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
.cobro-hrow{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--soft);padding:3px 0}
@media(max-width:560px){ .dash{grid-template-columns:1fr} }
.plata-sub{display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.plata-tab{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:8px 16px;font-size:14px;font-weight:600;color:var(--soft);transition:.15s}
.plata-tab:hover{border-color:var(--primary)}
.plata-tab.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.cobro-tools{display:inline-flex;gap:2px;flex:none}
.form-grid{display:flex;flex-direction:column}
.form-grid .bit-in{margin:2px 0 8px}

.ed-text{cursor:text;border-radius:6px;display:inline-block;width:100%}
.ed-text:hover{background:var(--paper)}
.ed-ph{color:var(--soft);font-style:italic}
.ed-pencil{opacity:0;margin-left:5px;color:var(--soft)}
.ed-text:hover .ed-pencil{opacity:1}
.ed-wrap{display:flex;gap:6px;align-items:flex-start}
.ed-in{flex:1;padding:8px 10px;border:1.5px solid var(--primary);border-radius:9px;font-size:13.5px;outline:none;line-height:1.5}
.ed-btns{display:flex;gap:4px}

.add-inline,.add-client{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.add-inline input,.add-client input{flex:1;min-width:160px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;outline:none}
.add-inline input:focus,.add-client input:focus{border-color:var(--primary)}
.add-client select{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;background:#fff}
.ghost-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--primary);transition:.15s}
.ghost-btn:hover{border-color:var(--primary);background:var(--primary-soft)}

.cal-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.cal-range{font-weight:600;font-size:15px}
.cal-today-btn{font-size:12.5px;color:var(--primary);background:none;border:none;font-weight:500;margin-top:2px}
.cal-day{display:flex;gap:14px;padding:12px 8px;border-bottom:1px solid var(--line)}
.cal-day:last-child{border-bottom:none}
.cal-day.today{background:var(--primary-soft);border-radius:11px;border-bottom-color:transparent}
.cal-daylabel{flex:none;width:96px}
.cal-dname{font-size:13.5px;font-weight:600;text-transform:capitalize}
.cal-dnum{font-size:12px;color:var(--soft)}
.cal-daybody{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.cal-chip{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;font-size:13.5px;border-left:3px solid;flex-wrap:wrap}
.ct-time{font-weight:600}
.ct-label{font-size:12.5px;font-weight:500}
.ct-note{color:var(--soft);font-size:12.5px}
.cal-chip-del{margin-left:auto;background:none;border:none;color:var(--soft);display:flex;padding:2px;cursor:pointer}

  var label=String(CAL[tipo].label||"").toLowerCase();
  var arr=S.priv.clientes||[];
  for(var i=0;i<arr.length;i++){ if(arr[i].tipo==="visitas" && String(arr[i].name||"").toLowerCase()===label) return arr[i]; }
  return null;
}
function fechaCorta(dateStr){ var d=new Date(dateStr+"T00:00:00"); if(isNaN(d.getTime())) return dateStr; return DIAS[(d.getDay()+6)%7]+" "+d.getDate(); }
function editClient(scope,id,patch){ var c=findClient(scope,id); if(c) Object.assign(c,patch); }
function allClientes(){
  var a=S.shared.clientes.map(function(c){ var o=Object.assign({},c); o.scope="compartido"; return o; });
  var b=S.priv.clientes.map(function(c){ var o=Object.assign({},c); o.scope="mio"; return o; });
  return a.concat(b);
}

}

function copyText(txt){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt); }
    else { var ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
    return true;
  }catch(e){ console.error(e); return false; }
}

async function loadAll(){
  // Perfil / workspace
  var ws="Mi trabajo";
  var pr=await sb.from("profiles").select("workspace").eq("id",S.user.id).maybeSingle();
  if(pr.data && pr.data.workspace) ws=pr.data.workspace;
  S.priv={ workspace:ws, recurrentes:[], proyectos:[], clientes:[], inbox:[], agenda:[] };
  S.shared={ clientes:[] };

  var rec=await sb.from("recurrentes").select("*").order("created_at",{ascending:true});
  if(rec.error) throw rec.error;
  S.priv.recurrentes=(rec.data||[]).map(recFromDb);

  var prj=await sb.from("proyectos").select("*").order("created_at",{ascending:true});
  if(prj.error) throw prj.error;
  S.priv.proyectos=(prj.data||[]).map(projFromDb);

  var inb=await sb.from("inbox_items").select("*").order("created_at",{ascending:false});
  if(inb.error) throw inb.error;
  S.priv.inbox=(inb.data||[]).map(inboxFromDb);

  var ag=await sb.from("agenda").select("*").eq("owner_id",S.user.id).order("hora_inicio",{ascending:true});
  if(ag.error) throw ag.error;
  S.priv.agenda=(ag.data||[]).map(agendaFromDb);

  var um=await sb.from("paquetes_umana").select("cliente_id, fecha_entrega, entregables").eq("cerrado",false);
  S.umActivos = (um.error)?[]:(um.data||[]);

  await loadCobros();
  await loadGastos();
  await loadAhorro();
  await ensureBoox();

  await refreshClientes(true);
}

// Trae los clientes y los reparte en compartidos (is_shared) y míos (privados).
async function refreshClientes(silent){
  var res=await sb.from("clientes").select("*").order("created_at",{ascending:true});
  if(res.error){ console.error(res.error); showError("No se pudieron cargar los clientes."); return; }
  var shared=[], mine=[];
  (res.data||[]).forEach(function(r){
    var c=clientFromDb(r);
    if(r.is_shared) shared.push(c); else mine.push(c);
  });
  if(!S.shared) S.shared={clientes:[]};
  if(!S.priv) return;
  S.shared.clientes=shared;
  S.priv.clientes=mine;
  if(!silent && !S.editing) render();
}

// Realtime: cualquier cambio en la tabla clientes vuelve a traer la lista.
function subscribeClientes(){
  if(S.channel){ sb.removeChannel(S.channel); S.channel=null; }
  S.channel = sb.channel("rt-clientes")
    .on("postgres_changes", {event:"*", schema:"public", table:"clientes"}, function(){
      refreshClientes(false);
    })
    .subscribe();
}

/* ------------------------------- app views -------------------------------- */
function hoyHTML(){
  var items=[];
  allClientes().forEach(function(c){
    var a=attentionFor(c);
    if(a) items.push({ name:c.name, badge:(c.scope==="compartido"?"compartido":"tuyo"), reasons:a.reasons, level:a.level, act:"quick", scope:c.scope, id:c.id, paqueteDue:(c.tipo==="paquete"&&c.ciclo==="por-entregar") });
  });
  S.priv.proyectos.forEach(function(pr){
    var a=attentionForProj(pr);
    if(a) items.push({ name:pr.name, badge:"proyecto", reasons:a.reasons, level:a.level, act:"goto-trabajo" });
  });
  // Paquetes de Umana activos: reels grabados sin editar + fecha de entrega
  (S.umActivos||[]).forEach(function(pq){
    var ee=pq.entregables||{};
    var cl=(allClientes().filter(function(c){return c.id===pq.cliente_id;})[0]||{}).name||"Paquete";
    var grab=(ee.reels||[]).filter(function(r){return r.estado==="grabado";}).length;
    if(grab>0) items.push({ name:cl, badge:"paquete", reasons:[grab+" reel"+(grab===1?"":"s")+" grabado"+(grab===1?"":"s")+" sin editar"], level:2, act:"goto-umana", cid:pq.cliente_id, cname:cl });
    if(pq.fecha_entrega){ var dr2=dueReason(pq.fecha_entrega); if(dr2) items.push({ name:cl, badge:"paquete", reasons:["Entrega del paquete: "+dr2.text], level:dr2.level, act:"goto-umana", cid:pq.cliente_id, cname:cl }); }
  });
  // Cobros: mensuales por vencer/atrasados + saldos de paquete pendientes
  (S.cobros||[]).forEach(function(co){
    var rc=cobroCalc(co);
    if(co.tipo==="mensual" && !rc.pagadoMes && rc.proxFecha){ var drc=dueReason(rc.proxFecha); if(drc) items.push({ name:co.nombre, badge:"cobro", reasons:["Cobro "+drc.text+" · "+plata(rc.proxMonto)], level:drc.level, act:"goto-plata" }); }
    else if(co.tipo==="paquete" && rc.saldo>0){ items.push({ name:co.nombre, badge:"cobro", reasons:["Saldo pendiente: "+plata(rc.saldo)], level:1, act:"goto-plata" }); }
  });
  // Boox: recordatorio suave de no descuidar la propia cuenta
  if((S.booxPend||0)>0) items.push({ name:"Boox", badge:"agencia", reasons:["Te quedan "+S.booxPend+" posts sin publicar esta semana"], level:1, act:"goto-boox" });
  // Visitas agendadas ya pasadas y sin contar -> pedir confirmación manual
  (S.priv.agenda||[]).forEach(function(e){
    if(!e.cliente_id || e.contada) return;
    if(daysUntil(e.date)>0) return; // todavía no llegó la fecha
    var cl=findClientAny(e.cliente_id);
    if(!cl || cl.tipo!=="visitas") return;
    if(cl.visitasHechas>=cl.visitasTotal) return; // paquete completo, no molestar
    items.push({ name:cl.name, badge:"visita", reasons:["¿Hiciste la visita del "+fechaCorta(e.date)+"? Confirmá para contarla"], level:2, act:"confirm-visit", eid:e.id, cid:cl.id });
  });
  items.sort(function(x,y){return y.level-x.level;});
  var atList = items.length===0
    ? '<p class="empty good-empty">Todo bajo control por ahora. Cuando algo se atrase o tenga fecha cerca, va a aparecer acá.</p>'
    : '<ul class="att-list">'+items.map(function(o){
        var btn = o.act==="quick"
          ? '<button class="att-action" data-act="quick" data-scope="'+o.scope+'" data-id="'+o.id+'">'+(o.paqueteDue?"Marcar entregado":"Atendido hoy")+'</button>'
          : o.act==="confirm-visit"
          ? '<button class="att-action" data-act="confirm-visit" data-eid="'+o.eid+'" data-cid="'+o.cid+'">Sí, la hice</button>'
          : o.act==="goto-umana"
          ? '<button class="att-action" data-act="goto-umana" data-cid="'+o.cid+'" data-name="'+esc(o.cname||"")+'">Ver</button>'
          : o.act==="goto-plata"
          ? '<button class="att-action" data-act="goto-plata">Ver</button>'
          : o.act==="goto-boox"
          ? '<button class="att-action" data-act="goto-boox">Ver</button>'
          : '<button class="att-action" data-act="goto-trabajo">Ver</button>';
        return '<li class="att lvl'+o.level+'"><div class="att-bar"></div><div class="att-body"><div class="att-top"><span class="att-name">'+esc(o.name)+'</span><span class="chip ghost">'+o.badge+'</span></div><div class="att-reasons">'+o.reasons.map(function(r){return '<span class="reason">'+esc(r)+'</span>';}).join("")+'</div></div>'+btn+'</li>';
      }).join("")+'</ul>';
  var pend=S.priv.inbox.filter(function(i){return !i.done;}).length;
  var inbox = S.priv.inbox.length===0
    ? '<li class="empty">Vacío. Buena señal, o ya lo anotaste todo en la cabeza.</li>'
    : S.priv.inbox.map(function(i){
        return '<li class="'+(i.done?"done":"")+'"><button class="check" data-act="toggle-inbox" data-id="'+i.id+'">'+ic(i.done?"check2":"circle",18)+'</button><span>'+esc(i.text)+'</span><button class="ic-btn faint" data-act="del-inbox" data-id="'+i.id+'">'+ic("trash",14)+'</button></li>';
      }).join("");
  return '<section class="hero"><div class="hero-head">'+ic("alert",18)+'<h2>Necesita tu atención</h2></div>'+atList+'</section>'+
    '<section class="card"><div class="card-head"><span class="card-title">'+ic("inbox",16)+' Buzón rápido</span><span class="card-sub">'+pend+' para resolver</span></div>'+
    '<p class="card-note">Te piden algo al pasar y no querés cortar lo que estás haciendo: tiralo acá en dos segundos y resolvelo después en tanda.</p>'+
    '<div class="capture"><input id="capture" placeholder="Ej: placa para la acción de cervezas…" /><button class="primary-btn sm" data-act="add-inbox">'+ic("plus",16)+'</button></div>'+
    '<ul class="inbox">'+inbox+'</ul></section>';
}

/* --------------------------- bitácora diaria ------------------------------ */
function bitDefaults(){
  return {
    agencia:{ hecho:false },
    materiales:{ entrega_despacho:false, control_stock:false, entrega_vendedores:false, materiales_texto:"", accion_materiales:false },
    catalogos:{ catalogo:null, acciones_texto:"" },
    disenos:{ tipo:null, placa_cual:"", placas:[] }
  };
}
// Asegura la lista de placas y migra el viejo placa_cual sin perder lo cargado.
function bitNormDisenos(dis){
  if(!dis) return {tipo:null,placa_cual:"",placas:[]};
  if(!Array.isArray(dis.placas)) dis.placas=[];
  if(dis.tipo==="placa" && dis.placas.length===0 && dis.placa_cual){ dis.placas=[{nombre:dis.placa_cual, archivo_url:""}]; }
  return dis;
}
async function loadBitacora(fecha){
  var def=bitDefaults();
  var res=await sb.from("bitacora_diaria").select("tarea, detalle").eq("owner_id",S.user.id).eq("fecha",fecha);
  if(res.error){ console.error(res.error); showError("No se pudo cargar la bitácora."); }
  else { (res.data||[]).forEach(function(r){ if(def[r.tarea]) def[r.tarea]=Object.assign(def[r.tarea], r.detalle||{}); }); }
  bitNormDisenos(def.disenos);
  S.bitacora=def;
}
async function saveBit(tarea){
  if(!S.bitacora) return;
  var res=await sb.from("bitacora_diaria").upsert(
    { owner_id:S.user.id, fecha:S.bitDate, tarea:tarea, detalle:S.bitacora[tarea] },
    { onConflict:"owner_id,fecha,tarea" });
  if(res.error){ console.error(res.error); showError("No se pudo guardar la bitácora."); }
}
async function bitUploadPlaca(file, idx){
  if(!file || !S.bitacora) return;
  S.bitLoading=true; render();
  try{
    var ext=(String(file.name).split(".").pop()||"jpg").toLowerCase();
    var path="placas/"+S.bitDate+"/"+Date.now()+"-"+idx+"."+ext;
    var up=await sb.storage.from("bitacora").upload(path, file, {upsert:true});
    if(up.error) throw up.error;
    S.bitacora.disenos.placas[idx].archivo_url=sb.storage.from("bitacora").getPublicUrl(path).data.publicUrl;
    await saveBit("disenos");
  }catch(e){ console.error(e); showError("No se pudo subir la placa."); }
  S.bitLoading=false; render();
}
// Texto-resumen de un día de bitácora (reusado en los PDF)
function bitResumenLineas(b, esLunes){
  var L=[];
  if(esLunes) L.push("Agencia y copys: "+(b.agencia&&b.agencia.hecho?"revisé copy y posts ✓":"—"));
  var m=b.materiales||{}, mats=[];
  if(m.entrega_despacho) mats.push("entregué materiales para despacho de pedido vendido");
  if(m.control_stock) mats.push("orden / control de stock");
  if(m.entrega_vendedores) mats.push("entregué a vendedores"+(m.materiales_texto?(" ("+m.materiales_texto+")"):""));
  if(m.accion_materiales) mats.push("armamos acción con materiales");
  L.push("Materiales: "+(mats.length?mats.join("; "):"—"));
  var c=b.catalogos||{};
  L.push("Catálogos: "+(c.catalogo?String(c.catalogo).toUpperCase():"—")+(c.acciones_texto?(" — "+c.acciones_texto):""));
  var di=b.disenos||{}, dtxt="—";
  if(di.tipo==="placa"){ var ps=(di.placas||[]).map(function(p){return p.nombre||"placa";}); if(!ps.length && di.placa_cual) ps=[di.placa_cual]; dtxt="hice placa(s): "+(ps.length?ps.join(", "):"sí"); }
  else if(di.tipo==="delegada") dtxt="la delegué a la agencia";
  else if(di.tipo==="ninguno") dtxt="no tuve";
  L.push("Diseños: "+dtxt);
  return L;
}
function lunesDe(key){ var d=new Date(key+"T00:00:00"); var wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d; }
function getLogoDataURL(){
  return new Promise(function(resolve){
    try{
      var img=new Image();
      img.onload=function(){ try{ var cv=document.createElement("canvas"); cv.width=img.naturalWidth; cv.height=img.naturalHeight; cv.getContext("2d").drawImage(img,0,0); resolve(cv.toDataURL("image/png")); }catch(e){ resolve(null); } };
      img.onerror=function(){ resolve(null); };
      img.src="logo-boox.png";
    }catch(e){ resolve(null); }
  });
}
async function pdfHeader(doc, titulo, subtitulo){
  doc.setFillColor(245,16,139); doc.rect(0,0,210,24,"F");
  var logo=await getLogoDataURL();
  var x=12;
  if(logo){ try{ doc.addImage(logo,"PNG",12,7,22,10); x=40; }catch(e){} }
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(15);
  doc.text("Boox", x, 15);
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.text(titulo, 200, 11, {align:"right"});
  doc.setFontSize(9); doc.text(subtitulo, 200, 17, {align:"right"});
  doc.setTextColor(20,17,24);
}
function pdfSeccion(doc, y, titulo, lineas){
  if(y>275){ doc.addPage(); y=20; }
  doc.setFont("helvetica","bold"); doc.setTextColor(245,16,139); doc.setFontSize(12);
  doc.text(titulo, 14, y); y+=6;
  doc.setFont("helvetica","normal"); doc.setTextColor(20,17,24); doc.setFontSize(10.5);
  lineas.forEach(function(ln){
    var wrapped=doc.splitTextToSize(ln, 180);
    wrapped.forEach(function(w){ if(y>282){ doc.addPage(); y=20; } doc.text(w, 16, y); y+=5.4; });
  });
  return y+3;
}
async function pdfDia(){
  if(!window.jspdf){ showError("No se pudo cargar el generador de PDF."); return; }
  var b=S.bitacora||bitDefaults();
  var doc=new window.jspdf.jsPDF();
  await pdfHeader(doc, "Bitácora del día", "Grandbar · Josefina");
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(bitFechaLarga(S.bitDate), 14, 34);
  var y=44, esL=esLunes(S.bitDate);
  if(esL) y=pdfSeccion(doc, y, "Agencia y copys", ["Revisé copy y posts de la semana: "+(b.agencia.hecho?"sí ✓":"no")]);
  var m=b.materiales||{};
  y=pdfSeccion(doc, y, "Materiales", [
    (m.entrega_despacho?"✓":"○")+" Entregué materiales para despacho de pedido vendido",
    (m.control_stock?"✓":"○")+" Orden / control de stock del depósito",
    (m.entrega_vendedores?"✓":"○")+" Entregué materiales a vendedores"+(m.materiales_texto?(" — "+m.materiales_texto):""),
    (m.accion_materiales?"✓":"○")+" Armamos una acción con materiales del depósito"
  ]);
  var c=b.catalogos||{};
  y=pdfSeccion(doc, y, "Catálogos online", ["Catálogo corregido: "+(c.catalogo?String(c.catalogo).toUpperCase():"—"), "Acciones: "+(c.acciones_texto||"—")]);
  var di=b.disenos||{}, dl=[];
  if(di.tipo==="placa"){ dl.push("Hice placa(s):"); var ps=(di.placas||[]); if(!ps.length && di.placa_cual) ps=[{nombre:di.placa_cual}]; if(ps.length){ ps.forEach(function(p,i){ dl.push("  "+(i+1)+") "+(p.nombre||"(sin nombre)")+(p.archivo_url?" [archivo subido]":"")); }); } else dl.push("  (sin detalle)"); }
  else if(di.tipo==="delegada") dl.push("La delegué a la agencia");
  else if(di.tipo==="ninguno") dl.push("No tuve");
  else dl.push("—");
  y=pdfSeccion(doc, y, "Diseños", dl);
  doc.save("bitacora-"+S.bitDate+".pdf");
}
async function pdfSemana(){
  if(!window.jspdf){ showError("No se pudo cargar el generador de PDF."); return; }
  var lun=lunesDe(S.bitDate), dias=[]; for(var i=0;i<6;i++){ var dd=new Date(lun); dd.setDate(lun.getDate()+i); dias.push(keyOf(dd)); }
  var res=await sb.from("bitacora_diaria").select("fecha,tarea,detalle").eq("owner_id",S.user.id).in("fecha",dias);
  var map={}; dias.forEach(function(k){ map[k]=bitDefaults(); });
  if(!res.error){ (res.data||[]).forEach(function(r){ if(map[r.fecha] && map[r.fecha][r.tarea]) map[r.fecha][r.tarea]=Object.assign(map[r.fecha][r.tarea], r.detalle||{}); }); }
  var doc=new window.jspdf.jsPDF();
  await pdfHeader(doc, "Reporte semanal", "Grandbar · Josefina");
  doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text("Semana del "+keyOf(lun)+" al "+dias[5], 14, 34);
  var y=44;
  dias.forEach(function(k,idx){
    if(idx===5){} // sábado
    y=pdfSeccion(doc, y, DIAS[idx]+" "+new Date(k+"T00:00:00").getDate(), bitResumenLineas(map[k], idx===0));
  });
  doc.save("bitacora-semana-"+keyOf(lun)+".pdf");
}
function bitFechaLarga(key){
  var d=new Date(key+"T00:00:00"); if(isNaN(d.getTime())) return key;
  return DIAS[(d.getDay()+6)%7]+" "+d.getDate()+" "+MESES[d.getMonth()].slice(0,3);
}
function esLunes(key){ var d=new Date(key+"T00:00:00"); return d.getDay()===1; }
// fila de check (tildable) reutilizable
function bitCheck(on, act, k, label){
  return '<button class="bit-check'+(on?" on":"")+'" data-act="'+act+'"'+(k?' data-k="'+k+'"':'')+'>'+ic(on?"check2":"circle",18)+'<span>'+esc(label)+'</span></button>';
}

  var agencia = esLunes(S.bitDate)
    ? '<div class="bit-block"><div class="bit-title">Agencia y copys <span class="bit-tag">lunes</span></div>'+
        bitCheck(b.agencia.hecho,"bit-agencia","","Revisé copy y posts de la semana")+'</div>'
    : '<div class="bit-block bit-off"><div class="bit-title">Agencia y copys</div><p class="bit-muted">Es de los lunes.</p></div>';
  // 2) Materiales
  var matTexto = b.materiales.entrega_vendedores
    ? '<input class="bit-in" id="bit-mat-texto" data-act="bit-mat-texto" placeholder="¿Qué materiales?" value="'+esc(b.materiales.materiales_texto||"")+'" />'
    : '';

    bitCheck(b.materiales.entrega_despacho,"bit-mat","entrega_despacho","Entregué materiales para el despacho de un pedido vendido")+
    bitCheck(b.materiales.control_stock,"bit-mat","control_stock","Hice orden / control de stock del depósito")+
    bitCheck(b.materiales.entrega_vendedores,"bit-mat","entrega_vendedores","Me pidieron / entregué materiales a vendedores")+
    matTexto+
    bitCheck(b.materiales.accion_materiales,"bit-mat","accion_materiales","Armamos una acción con materiales del depósito")+
    '</div>';
  // 3) Catálogos
  var catOpts=[["on","ON"],["off","OFF"],["ambos","Ambos"]].map(function(o){
    return '<button class="bit-pill'+(b.catalogos.catalogo===o[0]?" on":"")+'" data-act="bit-cat" data-v="'+o[0]+'">'+o[1]+'</button>';
  }).join("");

    '<div class="bit-lbl">¿Qué catálogo corregiste?</div><div class="bit-pills">'+catOpts+'</div>'+

    return '<button class="bit-pill'+(b.disenos.tipo===o[0]?" on":"")+'" data-act="bit-dis" data-v="'+o[0]+'">'+o[1]+'</button>';
  }).join("");
  var disPlacas="";
  if(b.disenos.tipo==="placa"){
    var placas=b.disenos.placas||[];
    var prows=placas.map(function(p,i){
      return '<div class="placa-row"><input class="bit-in" data-act="bit-placa-nombre" data-i="'+i+'" placeholder="nombre de la placa" value="'+esc(p.nombre||"")+'" />'+

        '<button class="sub-del" data-act="bit-placa-del" data-i="'+i+'">'+ic("x",13)+'</button></div>'+
        (p.archivo_url?'<img class="um-thumb" src="'+esc(p.archivo_url)+'" />':'');

    disPlacas='<div class="bit-lbl" style="margin-top:6px">Placas que hiciste</div>'+(prows||'<p class="hint">Sumá la primera placa.</p>')+'<button class="cal-addbtn" data-act="bit-placa-add">'+ic("plus",13)+' agregar placa</button>';

    '<div class="cal-nav"><button class="ic-btn sm" data-act="bit-prev">‹</button><div style="text-align:center"><div class="cal-range" style="text-transform:capitalize">'+bitFechaLarga(S.bitDate)+'</div>'+(!esHoy?'<button class="cal-today-btn" data-act="bit-today">volver a hoy</button>':'')+'</div><button class="ic-btn sm" data-act="bit-next">›</button></div>'+

function trabajoHTML(){
  var recs=S.priv.recurrentes.map(function(r){
    return '<li class="'+(r.done?"done":"")+'"><button class="check" data-act="toggle-rec" data-id="'+r.id+'">'+ic(r.done?"check2":"circle",20)+'</button><div class="rec-body"><span class="rec-name">'+esc(r.name)+'</span>'+(r.nota?'<span class="rec-note">'+esc(r.nota)+'</span>':'')+'</div></li>';
  }).join("") || '<li class="empty">Todavía no cargaste tareas recurrentes.</li>';
  var projs=S.priv.proyectos.map(function(pr){
    var subs=pr.subtasks||[];
    var hasSubs=subs.length>0;
    var prog=projProgress(pr);
    var doneN=subs.filter(function(s){return s.done;}).length;
    var editing = S.editing && S.editing.kind==="proj-next" && S.editing.id===pr.id;
    var nextHtml = editing
      ? '<div class="ed-wrap"><input class="ed-in" id="edit-input" value="'+esc(pr.next)+'" /><div class="ed-btns"><button class="ic-btn good" data-act="edit-save">'+ic("check",15)+'</button><button class="ic-btn" data-act="edit-cancel">'+ic("x",15)+'</button></div></div>'
      : '<span class="ed-text" data-act="edit-start" data-kind="proj-next" data-id="'+pr.id+'">'+(pr.next?esc(pr.next):'<span class="ed-ph">¿Cuál es el próximo paso?</span>')+ic("pencil",12,"ed-pencil")+'</span>';
    var progRow = hasSubs
      ? '<div class="proj-row"><span class="pct">'+doneN+'/'+subs.length+' hechas · '+prog+'%</span></div>'
      : '<div class="proj-row"><div class="step-grp"><button class="ic-btn sm" data-act="proj-step" data-id="'+pr.id+'" data-dir="-1">–</button><span class="pct">'+prog+'%</span><button class="ic-btn sm" data-act="proj-step" data-id="'+pr.id+'" data-dir="1">+</button></div></div>';
    var subsHtml = subs.map(function(s){
      return '<li class="'+(s.done?"done":"")+'"><button class="check" data-act="toggle-sub" data-id="'+pr.id+'" data-sid="'+s.id+'">'+ic(s.done?"check2":"circle",16)+'</button><span>'+esc(s.name)+'</span><button class="sub-del" data-act="del-sub" data-id="'+pr.id+'" data-sid="'+s.id+'">'+ic("x",13)+'</button></li>';
    }).join("");
    var due=pr.entrega||"";
    var dr=due?dueReason(due):null;
    var dueBadge = dr ? ' <span class="due-badge '+(dr.level===3?"danger":"warn")+'">'+esc(dr.text)+'</span>' : '';
    return '<div class="proj"><div class="proj-name">'+esc(pr.name)+'</div>'+
      '<div class="bar"><div class="bar-fill" style="width:'+prog+'%"></div></div>'+
      progRow+
      '<ul class="subs">'+subsHtml+'</ul>'+
      '<div class="add-sub"><input id="sub-'+pr.id+'" placeholder="Sumar sub-tarea…" /><button class="ghost-btn sm" data-act="add-sub" data-id="'+pr.id+'">'+ic("plus",14)+'</button></div>'+
      '<div class="proj-due"><span class="lbl2">Entrega</span><input class="due-in" type="date" data-act="set-proj-due" data-id="'+pr.id+'" value="'+due+'" />'+dueBadge+'</div>'+
      '<div class="proj-next"><span class="lbl">Próximo paso</span>'+nextHtml+'</div></div>';
  }).join("") || '<div class="empty">Sin proyectos cargados.</div>';
  var esJose=(S.profile==="josefina");
  var recTitulo = esJose ? "Otras tareas sueltas" : "Tareas del día a día";
  var recNota = esJose ? "Para cosas que no entran en la bitácora. Tildalas y reinicialas cuando arranca un día nuevo." : "Lo que vuelve siempre. Tildalo a medida que lo hacés; reinicialo cuando arranca un día nuevo.";
  return (esJose?bitacoraHTML():"")+
    '<section class="card"><div class="card-head"><span class="card-title">'+ic("rotate",16)+' '+recTitulo+'</span><button class="link-btn" data-act="reset-rec">Reiniciar el día</button></div>'+

    '<div class="add-inline"><input id="add-rec" placeholder="Sumar una tarea recurrente…" /><button class="ghost-btn" data-act="add-rec">'+ic("plus",15)+' Agregar</button></div></section>'+

    '<p class="card-note">Lo que el día a día siempre te quiere comer. Movelos aunque sea un poquito por semana.</p>'+
    '<div class="proj-grid">'+projs+'</div>'+
    '<div class="add-inline"><input id="add-proj" placeholder="Sumar un proyecto…" /><button class="ghost-btn" data-act="add-proj">'+ic("plus",15)+' Agregar</button></div></section>';

  var end=days[6], todayK=keyOf(new Date());
  var range = (start.getMonth()===end.getMonth())
    ? start.getDate()+" – "+end.getDate()+" de "+MESES[end.getMonth()]
    : start.getDate()+" "+MESES[start.getMonth()].slice(0,3)+" – "+end.getDate()+" "+MESES[end.getMonth()].slice(0,3);
  var entries=S.priv.agenda||[];
  var esJose=(S.profile==="josefina");
  var rows=days.map(function(d){
    var k=keyOf(d);
    var list=entries.filter(function(e){return e.date===k;});

    if(esJose){ var fx=grandbarFixed(d,S.user.id); if(fx) list=list.concat([fx]); }
    list=list.slice().sort(function(a,b){return (a.start||"").localeCompare(b.start||"");});
    var chips=list.map(function(e){
      var c=CAL[e.tipo]||CAL.otro;
      var right = e.fixed
        ? '<span class="cal-fijo">'+ic("lock",11)+' fijo</span>'
        : '<button class="cal-chip-del" data-act="del-agenda" data-id="'+e.id+'">'+ic("x",14)+'</button>';
      return '<div class="cal-chip" style="border-left-color:'+c.color+';background:'+c.bg+'">'+avatarImg(S.profile,16)+'<span class="ct-time">'+esc(e.start)+(e.end?"–"+esc(e.end):"")+'</span><span class="ct-label" style="color:'+c.color+'">'+c.label+'</span>'+(e.note?'<span class="ct-note">· '+esc(e.note)+'</span>':'')+right+'</div>';
    }).join("");
    var open=S.openDay===k;
    var opts=tiposDe(S.profile).map(function(t){ return '<option value="'+t+'">'+esc(CAL[t].label)+'</option>'; }).join("");
    var form = open
      ? '<div class="cal-form"><select id="ag-tipo">'+opts+'</select><input class="t-in" id="ag-start" type="time" /><input class="t-in" id="ag-end" type="time" /><input class="n-in" id="ag-note" placeholder="nota (opcional)" /><button class="ic-btn good" data-act="day-add-save" data-key="'+k+'">'+ic("check",15)+'</button><button class="ic-btn" data-act="day-add-cancel">'+ic("x",15)+'</button></div>'
      : '<button class="cal-addbtn" data-act="day-add-open" data-key="'+k+'">'+ic("plus",13)+' agregar</button>';
    return '<div class="cal-day'+(k===todayK?" today":"")+'"><div class="cal-daylabel"><div class="cal-dname">'+DIAS[(d.getDay()+6)%7]+'</div><div class="cal-dnum">'+d.getDate()+' '+MESES[d.getMonth()].slice(0,3)+'</div></div><div class="cal-daybody">'+chips+form+'</div></div>';
  }).join("");
  var sub = esJose ? "Grandbar, Mika y otros" : "hotel + inglés";
  var note = esJose
    ? "Tu horario de Grandbar (lun–vie 08–17) ya aparece fijo todas las semanas. Sumá tus visitas (Mika) y cualquier otro bloque para tener la semana clara."
    : "Cargá los horarios de Casa Entonada (te los pasan cada semana) y tus clases de inglés. Así tenés la semana clara y sabés cuándo podés con la agencia.";
  return '<section class="card"><div class="card-head"><span class="card-title">'+ic("calendar",16)+' Mi agenda</span><span class="card-sub">'+sub+'</span></div>'+

    rows+'</section>';

// Trae TODAS las entradas de agenda (las dos usuarias) + los perfiles para
// saber el nombre/color de cada dueña. Lo usa solo la pestaña "Coordinar".
async function loadCoord(){
  var ag=await sb.from("agenda").select("*");
  var pf=await sb.from("profiles").select("*");
  if(ag.error || pf.error){ console.error(ag.error||pf.error); showError("No se pudo cargar la coordinación."); return; }
  S.people={};
  (pf.data||[]).forEach(function(p){
    var meta=PROFILES.filter(function(x){return x.id===p.profile;})[0];
    S.people[p.id]={ label: meta?meta.label:(p.workspace||"Alguien"), color: meta?meta.color:"var(--soft)", slot:p.profile };
  });
  S.allAgenda=(ag.data||[]).map(function(r){ var e=agendaFromDb(r); e.owner=r.owner_id; return e; });
}
function tMin(t){ if(!t) return null; var p=String(t).split(":"); return (+p[0])*60+(+p[1]); }
function minT(m){ var h=Math.floor(m/60), mm=m%60; return (h<10?"0":"")+h+":"+(mm<10?"0":"")+mm; }
// Huecos en los que NINGUNA de las dos tiene entradas, dentro de 09:00–18:00.
function freeGaps(entries){
  var WS=8*60, WE=20*60, busy=[];
  entries.forEach(function(e){
    var s=tMin(e.start); if(s==null) return;
    var en=tMin(e.end); if(en==null||en<=s) en=s+60;
    s=Math.max(s,WS); en=Math.min(en,WE);
    if(en>s) busy.push([s,en]);
  });
  busy.sort(function(a,b){return a[0]-b[0];});
  var merged=[];
  busy.forEach(function(iv){
    if(merged.length && iv[0]<=merged[merged.length-1][1]) merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],iv[1]);
    else merged.push([iv[0],iv[1]]);
  });
  var gaps=[], cur=WS;
  merged.forEach(function(iv){ if(iv[0]>cur) gaps.push([cur,iv[0]]); cur=Math.max(cur,iv[1]); });
  if(cur<WE) gaps.push([cur,WE]);
  return gaps;
}

function coordinarHTML(){
  var start=weekStart(S.coordWeekOff);
  var days=[]; for(var i=0;i<7;i++){ var d=new Date(start); d.setDate(start.getDate()+i); days.push(d); }
  var end=days[6], todayK=keyOf(new Date());
  var range = (start.getMonth()===end.getMonth())
    ? start.getDate()+" – "+end.getDate()+" de "+MESES[end.getMonth()]
    : start.getDate()+" "+MESES[start.getMonth()].slice(0,3)+" – "+end.getDate()+" "+MESES[end.getMonth()].slice(0,3);
  var entries=S.allAgenda||[];
  // Buscar el id de Josefina para inyectar su bloque fijo de Grandbar
  var josefinaId=null;
  Object.keys(S.people).forEach(function(id){ if(S.people[id].slot==="josefina") josefinaId=id; });
  if(!josefinaId && S.profile==="josefina") josefinaId=S.user.id;
  var rows=days.map(function(d){
    var k=keyOf(d);
    var list=entries.filter(function(e){return e.date===k;});
    if(josefinaId){ var fx=grandbarFixed(d,josefinaId); if(fx) list=list.concat([fx]); }
    list=list.slice().sort(function(a,b){return (a.start||"").localeCompare(b.start||"");});
    var chips=list.map(function(e){
      var c=CAL[e.tipo]||CAL.otro;
      var who=S.people[e.owner]||{label:(e.owner===josefinaId?"Josefina":"Alguien"),color:(e.owner===josefinaId?"var(--jose)":"var(--soft)"),slot:(e.owner===josefinaId?"josefina":null)};
      return '<div class="cal-chip" style="border-left-color:'+c.color+';background:'+c.bg+'">'+
        '<span class="cal-who" style="background:'+who.color+'">'+avatarImg(who.slot,16,who.label,who.color)+esc(who.label)+'</span>'+
        '<span class="ct-time">'+esc(e.start)+(e.end?"–"+esc(e.end):"")+'</span>'+
        '<span class="ct-label" style="color:'+c.color+'">'+c.label+'</span>'+
        (e.note?'<span class="ct-note">· '+esc(e.note)+'</span>':'')+
        (e.fixed?'<span class="cal-fijo">'+ic("lock",11)+' fijo</span>':'')+'</div>';
    }).join("");
    var gaps=freeGaps(list).map(function(g){
      return '<div class="cal-free">'+ic("check",13)+' Las dos libres '+minT(g[0])+'–'+minT(g[1])+'</div>';
    }).join("");
    return '<div class="cal-day'+(k===todayK?" today":"")+'"><div class="cal-daylabel"><div class="cal-dname">'+DIAS[(d.getDay()+6)%7]+'</div><div class="cal-dnum">'+d.getDate()+' '+MESES[d.getMonth()].slice(0,3)+'</div></div><div class="cal-daybody">'+chips+gaps+'</div></div>';
  }).join("");
  var legend=PROFILES.map(function(p){ return '<span class="coord-leg">'+avatarImg(p.id,20)+p.label+'</span>'; }).join("");
  return '<section class="card"><div class="card-head"><span class="card-title">'+ic("calendar",16)+' Coordinar agendas</span><span class="card-sub">'+(S.coordLoading?"cargando…":"las dos, lado a lado")+'</span></div>'+
    '<p class="card-note">Las dos agendas juntas para ver de un vistazo cuándo cada una está ocupada y encontrar huecos para grabar. Incluye el horario fijo de Grandbar de Josefina (lun–vie 08–17). En verde, los ratos en que <strong>las dos están libres</strong> (franja 08–20). Acá no se edita; cada una carga lo suyo en su pestaña.</p>'+
    '<div class="coord-legend">'+legend+'</div>'+
    '<div class="cal-nav"><button class="ic-btn sm" data-act="coord-week" data-dir="-1">‹</button><div style="text-align:center"><div class="cal-range">'+range+'</div>'+(S.coordWeekOff!==0?'<button class="cal-today-btn" data-act="coord-week-today">volver a esta semana</button>':'')+'</div><button class="ic-btn sm" data-act="coord-week" data-dir="1">›</button></div>'+
    rows+'</section>';
}

  } : {

  S.calCtx = (c.data) ? { rubros:c.data.rubros||"", objetivos:c.data.objetivos||"", reglas:c.data.reglas||"", tono:c.data.tono||"", notas:c.data.notas||"" } : defaults;
  var k=await sb.from("cliente_calendario").select("dias, tema").eq("cliente_id",clienteId).maybeSingle();
  if(k.error) console.error(k.error);

}
async function loadStock(fecha){
  if(!S.calClienteId) return;
  var s=await sb.from("cliente_stock").select("texto, updated_at").eq("cliente_id",S.calClienteId).eq("fecha",fecha).maybeSingle();
  if(s.error) console.error(s.error);
  S.calStockTexto = s.data ? (s.data.texto||"") : "";
  S.calStockUpdated = s.data ? s.data.updated_at : null;
}
async function saveStock(){
  if(!S.calClienteId) return;
  var res=await sb.from("cliente_stock").upsert({cliente_id:S.calClienteId, fecha:S.calStockFecha, texto:S.calStockTexto}, {onConflict:"cliente_id,fecha"});
  if(res.error){ console.error(res.error); showError("No se pudo guardar el stock."); }
  else { S.calStockUpdated=new Date().toISOString(); }
}
async function saveContexto(){
  if(!S.calClienteId || !S.calCtx) return;
  var res=await sb.from("cliente_contexto").upsert(Object.assign({cliente_id:S.calClienteId}, S.calCtx), {onConflict:"cliente_id"});
  if(res.error){ console.error(res.error); showError("No se pudo guardar el contexto."); }
}
async function saveCalendarioDB(){
  if(!S.calClienteId) return;
  S.calSaving=true; render();
  var res=await sb.from("cliente_calendario").upsert({cliente_id:S.calClienteId, dias:S.calData, tema:S.calTema}, {onConflict:"cliente_id"});
  S.calSaving=false;
  if(res.error){ console.error(res.error); showError("No se pudo guardar el calendario."); }
  render();
}
async function generarCalendario(){
  S.calLoading=true; S.calError=""; S.calData=[]; S.calProgreso=""; render();
  await saveContexto();
  var dias=["lunes","martes","miércoles","jueves","viernes","sábado"];
  var tema=S.calTema, previos=[], fallos=[];
  for(var i=0;i<dias.length;i++){
    S.calProgreso="("+(i+1)+"/"+dias.length+") "+dias[i]+"…"; render();
    var ok=false;
    try{
      var r=await fetch("/.netlify/functions/generar-calendario", {
        method:"POST", headers:{"content-type":"application/json"},
        body: JSON.stringify({ contexto:S.calCtx, stock:S.calStockTexto, tema:tema, dia:dias[i], previos:previos, proponer_tema:(!tema && i===0), perfil:(S.calClienteId===S.booxClienteId?"boox":"phoneshop") })
      });
      var raw=""; try{ raw=await r.text(); }catch(e){}
      var data=null; try{ data=JSON.parse(raw); }catch(e){}
      if(r.ok && data && Array.isArray(data.contenidos)){
        if(!tema && data.tema_semana){ tema=data.tema_semana; S.calTema=tema; }
        var diaObj={ dia:dias[i], tema_del_dia:data.tema_del_dia||"", contenidos:data.contenidos };
        S.calData.push(diaObj);
        previos.push({ dia:dias[i], tema_del_dia:diaObj.tema_del_dia });
        ok=true; render();
      } else if(r.status===504 || (raw && /timeout/i.test(raw))){
        fallos.push(dias[i]+" (tardó de más)");
      } else {
        fallos.push(dias[i]+(data&&data.error?(" — "+data.error):(" (HTTP "+r.status+")")));
      }
    }catch(e){ console.error(e); fallos.push(dias[i]+" (sin conexión)"); }
  }
  S.calLoading=false; S.calProgreso="";
  if(S.calData.length){ await saveCalendarioDB(); }
  if(fallos.length){
    S.calError="No se pudieron generar: "+fallos.join("; ")+". Tocá Regenerar para reintentar esos días.";
  }
  render();
}

var REEL_ESTADOS=[{id:"guion",label:"Guión"},{id:"enviado",label:"Enviado a Umana"},{id:"grabado",label:"Grabado"},{id:"publicado",label:"Publicado"}];
function umDefault(){
  var carr=[]; for(var i=0;i<7;i++) carr.push({hecho:false,descripcion:""});
  var ap=[]; for(var j=0;j<5;j++) ap.push({hecho:false,nota:""});
  var reels=[]; for(var k=0;k<7;k++) reels.push({estado:"guion"});
  return { calendario:{hecho:false,pdf_url:"",img_url:""}, carruseles:carr, stories:{propias_total:20,propias_hechas:0,a_pedido:ap,drive_url:""}, reels:reels };
}
function umNormalizar(e){
  if(!e || !e.calendario) return umDefault();
  var d=umDefault();
  e.calendario=Object.assign(d.calendario, e.calendario||{});
  if(!Array.isArray(e.carruseles)) e.carruseles=d.carruseles;
  e.stories=Object.assign(d.stories, e.stories||{});
  if(!Array.isArray(e.stories.a_pedido)) e.stories.a_pedido=d.stories.a_pedido;
  if(!Array.isArray(e.reels)) e.reels=d.reels;
  return e;
}
function umProgress(e){
  if(!e) return 0;
  var done=0, total=40;
  if(e.calendario && e.calendario.hecho) done+=1;
  (e.carruseles||[]).forEach(function(c){ if(c.hecho) done++; });
  var st=e.stories||{};
  done += Math.min(st.propias_total||20, st.propias_hechas||0);
  (st.a_pedido||[]).forEach(function(a){ if(a.hecho) done++; });
  (e.reels||[]).forEach(function(r){ if(r.estado==="publicado") done++; });
  return Math.round(done/total*100);
}
async function loadUmana(clienteId, nombre){
  S.umClienteId=clienteId; S.umNombre=nombre||"Umana";
  var res=await sb.from("paquetes_umana").select("*").eq("cliente_id",clienteId).order("created_at",{ascending:false});
  if(res.error){ console.error(res.error); showError("No se pudieron cargar los paquetes."); S.umList=[]; S.umSel=null; return; }
  S.umList=(res.data||[]).map(function(p){
    return { id:p.id, fecha_apertura:p.fecha_apertura, fecha_entrega:p.fecha_entrega||"", estado:p.estado, cerrado:!!p.cerrado, entregables:umNormalizar(p.entregables) };
  });
  var act=S.umList.filter(function(p){return !p.cerrado;})[0];
  S.umSel = act || S.umList[0] || null;
}
async function openUmana(){
  var res=await sb.from("paquetes_umana").insert({ cliente_id:S.umClienteId, owner_id:S.user.id, estado:"produccion", cerrado:false, entregables:umDefault() }).select().single();
  if(res.error){ console.error(res.error); showError("No se pudo abrir el paquete nuevo."); return; }
  var p=res.data;
  var obj={ id:p.id, fecha_apertura:p.fecha_apertura, fecha_entrega:p.fecha_entrega||"", estado:p.estado, cerrado:false, entregables:umNormalizar(p.entregables) };
  S.umList.unshift(obj); S.umSel=obj; render();
}
async function saveUmanaSel(){
  if(!S.umSel) return;
  var p=S.umSel;
  var res=await sb.from("paquetes_umana").update({ fecha_entrega:p.fecha_entrega||null, estado:p.estado, cerrado:p.cerrado, entregables:p.entregables }).eq("id",p.id);
  if(res.error){ console.error(res.error); showError("No se pudo guardar el paquete."); }
}
async function umDoUpload(file, campo){
  if(!S.umSel || !file) return;
  S.umSaving=true; render();
  try{
    var ext=(String(file.name).split(".").pop()||"dat").toLowerCase();
    var path=S.umClienteId+"/"+S.umSel.id+"/calendario-"+campo+"-"+Date.now()+"."+ext;
    var up=await sb.storage.from("umana-paquetes").upload(path, file, {upsert:true});
    if(up.error) throw up.error;

function plata(n){ n=Math.round(+n||0); return "$"+n.toLocaleString("es-AR"); }
function gastosMes(){

function mesKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function pagosDe(id){ return S.pagos.filter(function(p){return p.cobro_id===id;}); }
function factor5050(c){ return (c.is_shared && c.reparte_5050)?0.5:1; }
function proxFechaMensual(c, pagado){
  if(!c.dia_pago) return null;
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  if(pagado){ m+=1; if(m>11){ m=0; y++; } }
  var last=new Date(y,m+1,0).getDate();
  return keyOf(new Date(y,m,Math.min(c.dia_pago,last)));
}
function cobroCalc(c){
  var pg=pagosDe(c.id), cm=mesKey();
  var r={estado:"",cls:"atencion",saldo:0,ccSaldo:0,proxFecha:null,proxMonto:c.monto||0,expectedMes:0,entradoMes:0,pagadoMes:false};
  pg.forEach(function(p){
    var pm=p.fecha?mesKey(new Date(p.fecha+"T00:00:00")):"";
    if(pm===cm && p.tipo!=="cc_acumulado") r.entradoMes+=(+p.monto||0);
  });
  if(c.tipo==="mensual"){
    r.pagadoMes=pg.some(function(p){return p.periodo===cm && p.tipo==="completo";});
    r.estado=r.pagadoMes?"Pagado este mes":"Pendiente"; r.cls=r.pagadoMes?"bien":"atencion";
    r.proxMonto=c.monto||0; r.proxFecha=proxFechaMensual(c,r.pagadoMes); r.expectedMes=c.monto||0;
  } else if(c.tipo==="paquete"){
    var lab="P"+(c.paquete_actual||1), paid=0;
    pg.forEach(function(p){ if(p.periodo===lab) paid+=(+p.monto||0); });
    r.saldo=Math.max(0,(c.monto||0)-paid);
    r.estado=paid<=0?"Pendiente":(r.saldo<=0?"Pagado":"Seña / parcial"); r.cls=(r.saldo<=0&&paid>0)?"bien":"atencion";
    r.proxMonto=r.saldo; r.expectedMes=r.saldo;
  } else if(c.tipo==="cc"){
    var acum=0,sald=0;
    pg.forEach(function(p){ if(p.tipo==="cc_acumulado") acum+=(+p.monto||0); else if(p.tipo==="cc_saldado") sald+=(+p.monto||0); });
    r.ccSaldo=Math.max(0,acum-sald);
    r.estado="Saldo en cc: "+plata(r.ccSaldo); r.cls=r.ccSaldo>0?"atencion":"bien"; r.expectedMes=c.monto||0;
  } else {
    var vp=pg.filter(function(p){return p.periodo===cm;}), vm=0;
    vp.forEach(function(p){ vm+=(+p.monto||0); });
    r.pagadoMes=vp.length>0; r.estado=r.pagadoMes?("Cobrado: "+plata(vm)):"Pendiente (cargá el monto)"; r.cls=r.pagadoMes?"bien":"atencion";
    r.proxMonto=vm; r.expectedMes=vm;
  }
  return r;
}
function dashboardMes(){
  var esp=0,ent=0;
  (S.cobros||[]).forEach(function(c){ var f=factor5050(c), r=cobroCalc(c); esp+=(r.expectedMes||0)*f; ent+=(r.entradoMes||0)*f; });
  return {esperado:esp, entrado:ent, falta:Math.max(0,esp-ent)};
}

    }
  } else if(c.tipo==="cc"){

  // historial

  if(S.cobroHist===c.id){
    var pgs=pagosDe(c.id).slice().reverse();
    hist='<div class="cobro-hist">'+(pgs.length?pgs.map(function(p){

  return '<div class="cobro estado-'+r.cls+'">'+
    '<div class="cobro-top"><span class="cobro-name">'+titulo+'</span>'+

async function ensureBoox(){
  var f=await sb.from("clientes").select("id").eq("is_shared",true).ilike("name","boox").maybeSingle();
  if(f.data){ S.booxClienteId=f.data.id; }
  else {
    var ins=await sb.from("clientes").insert({owner_id:S.user.id, is_shared:true, name:"Boox", tipo:"360", estado:"bien", nota:"Cuenta propia de la agencia"}).select("id").single();
    if(ins.error){ console.error(ins.error); } else S.booxClienteId=ins.data.id;
  }
  if(S.booxClienteId){
    var k=await sb.from("cliente_calendario").select("dias").eq("cliente_id",S.booxClienteId).maybeSingle();
    var pend=0;
    if(k.data && Array.isArray(k.data.dias)){ k.data.dias.forEach(function(d){ (d.contenidos||[]).forEach(function(c){ if(!c.hecho) pend++; }); }); }
    S.booxPend=pend;
  }
}
async function loadBoox(){
  S.booxLoading=true;
  var p=await sb.from("boox_planes").select("*").order("orden",{ascending:true}).order("created_at",{ascending:true});
  var i=await sb.from("boox_items").select("*").order("orden",{ascending:true}).order("created_at",{ascending:true});
  S.booxPlanes=(p.error)?[]:(p.data||[]);
  S.booxItems=(i.error)?[]:(i.data||[]);
  S.booxLoading=false;
}
async function guardarPlan(){
  var nombre=val("bp-nombre").trim(); if(!nombre){ showError("Poné un nombre."); return; }
  var row={ nombre:nombre, precio:val("bp-precio").trim(), recurrencia:val("bp-recurrencia")||"mensual", incluye:val("bp-incluye").trim() };
  var res = (S.booxPlanForm&&S.booxPlanForm.id) ? await sb.from("boox_planes").update(row).eq("id",S.booxPlanForm.id) : await sb.from("boox_planes").insert(row);
  if(res.error){ console.error(res.error); showError("No se pudo guardar el plan."); return; }
  S.booxPlanForm=null; await loadBoox(); render(); showOk("Plan guardado ✓");
}
async function deletePlan(id){ if(!window.confirm("¿Borrar este plan?")) return; var r=await sb.from("boox_planes").delete().eq("id",id); if(r.error){ showError("No se pudo borrar."); return; } await loadBoox(); render(); }
async function guardarItem(){
  var f=S.booxItemForm;
  var row={ tipo:f.tipo, titulo:val("bi-titulo").trim(), detalle:val("bi-detalle").trim(), url:val("bi-url")?val("bi-url").trim():"", img_url:f.img_url||"" };
  var res = f.id ? await sb.from("boox_items").update(row).eq("id",f.id) : await sb.from("boox_items").insert(row);

async function booxUpload(file){
  if(!file || !S.booxItemForm) return;
  S.booxLoading=true; render();
  try{
    var ext=(String(file.name).split(".").pop()||"jpg").toLowerCase();
    var path="portfolio/"+Date.now()+"."+ext;
    var up=await sb.storage.from("boox").upload(path, file, {upsert:true});
    if(up.error) throw up.error;
    S.booxItemForm.img_url=sb.storage.from("boox").getPublicUrl(path).data.publicUrl;
  }catch(e){ console.error(e); showError("No se pudo subir la imagen."); }
  S.booxLoading=false; render();
}

/* ------------------------------- auth ------------------------------------- */
function traducirError(e){
  var m=(e&&e.message)||"";
  if(/Invalid login credentials/i.test(m)) return "Email o contraseña incorrectos.";
  if(/already registered|already exists/i.test(m)) return "Ese email ya tiene cuenta. Iniciá sesión.";
  if(/at least 6/i.test(m)) return "La contraseña tiene que tener al menos 6 caracteres.";
  if(/valid email|invalid email/i.test(m)) return "Escribí un email válido.";
  if(/Email not confirmed/i.test(m)) return "Falta confirmar el email. Revisá tu casilla.";
  return "Algo falló: "+m;
}
async function submitLogin(){
  var email=val("email").trim(), pw=val("pw");
  if(!email || !pw){ S.loginErr="Completá email y contraseña"; render(); return; }
  S.busy=true; S.loginErr=""; S.loginMsg=""; render();
  try{
    if(S.loginMode==="create"){
      var ws=val("wsname").trim()||"Mi trabajo";
      var res=await sb.auth.signUp({ email:email, password:pw, options:{ data:{ profile:S.sel, workspace:ws } } });
      if(res.error) throw res.error;
      if(!res.data.session){
        // Supabase pide confirmar el email antes de poder entrar.
        S.busy=false; S.loginMode="enter";
        S.loginMsg="Te enviamos un email para confirmar la cuenta. Confirmalo y después iniciá sesión.";
        render(); return;
      }
      S.user=res.data.session.user;
      await sb.from("profiles").upsert({ id:S.user.id, workspace:ws, profile:S.sel });
      await enterApp();
    } else {
      var r2=await sb.auth.signInWithPassword({ email:email, password:pw });
      if(r2.error) throw r2.error;
      S.user=r2.data.session.user;
      await enterApp();
    }
  }catch(e){
    S.busy=false; S.loginErr=traducirError(e); render();
  }
}
async function enterApp(){
  S.phase="loading"; render();
  S.profile = (S.user.user_metadata && S.user.user_metadata.profile) || S.sel || "josefina";
  try{
    await loadAll();
  }catch(e){
    console.error("loadAll falló:", e);
    var det=(e && (e.message||e.error_description||e.msg))||"error desconocido";
    if(e && e.code) det+=" ["+e.code+"]";
    S.phase="login"; S.busy=false; S.loginErr="No se pudieron cargar los datos: "+det; render(); return;
  }
  try{
    var sess=await sb.auth.getSession();
    if(sess.data.session) sb.realtime.setAuth(sess.data.session.access_token);
  }catch(e){}
  subscribeClientes();
  S.busy=false; S.sel=null; S.loginErr=""; S.loginMsg="";
  S.phase="app"; S.tab="hoy"; S.editing=null; S.openDay=null;
  S.bitDate=keyOf(new Date()); S.bitacora=bitDefaults();
  render();
}

  if(a==="boox-plan-cancel"){ S.booxPlanForm=null; render(); return; }
  if(a==="boox-item-add"){ S.booxItemForm={id:null,tipo:d.tipo,img_url:""}; render(); return; }
  if(a==="boox-item-edit"){ var bi=S.booxItems.filter(function(x){return x.id===d.id;})[0]; if(bi){ S.booxItemForm=Object.assign({},bi); render(); } return; }
  if(a==="boox-item-del"){ await deleteItem(d.id); return; }
  if(a==="boox-item-save"){ guardarItem(); return; }
  if(a==="boox-item-cancel"){ S.booxItemForm=null; render(); return; }
  if(a==="boox-link-copy"){ var bl=S.booxItems.filter(function(x){return x.id===d.id;})[0]; if(bl){ copyText(bl.url||""); showOk("Link copiado ✓"); } return; }
  if(a==="boox-cal"){ S.calOpen=true; S.calLoading=true; S.calData=[]; S.calCtx=null; render(); await loadCalendarioFicha(S.booxClienteId, "Boox"); S.calLoading=false; render(); return; }

  // recurrentes
  if(a==="toggle-rec"){ var r=findRec(d.id); if(r){ r.done=!r.done; render(); await saveRow("recurrentes",r.id,{done:r.done}); } return; }
  if(a==="reset-rec"){
    S.priv.recurrentes.forEach(function(r){ r.done=false; }); render();
    var rr=await sb.from("recurrentes").update({done:false}).eq("owner_id",S.user.id);
    if(rr.error){ console.error(rr.error); showError("No se pudo reiniciar el día."); }
    return;
  }
  if(a==="add-rec"){ addRec(); return; }

  // proyectos
  if(a==="proj-step"){ var pr=findProj(d.id); if(pr){ pr.progress=Math.max(0,Math.min(100,pr.progress+(d.dir==="1"?10:-10))); render(); await saveRow("proyectos",pr.id,{progress:pr.progress}); } return; }
  if(a==="add-proj"){ addProj(); return; }
  if(a==="toggle-sub"){ var ps=findProj(d.id); if(ps){ var st=(ps.subtasks||[]).filter(function(s){return s.id===d.sid;})[0]; if(st){ st.done=!st.done; render(); await saveRow("proyectos",ps.id,{subtareas:ps.subtasks}); } } return; }
  if(a==="del-sub"){ var pd=findProj(d.id); if(pd){ pd.subtasks=(pd.subtasks||[]).filter(function(s){return s.id!==d.sid;}); render(); await saveRow("proyectos",pd.id,{subtareas:pd.subtasks}); } return; }
  if(a==="add-sub"){ addSub(d.id); return; }

  // buzón
  if(a==="add-inbox"){ addInboxItem(); return; }
  if(a==="toggle-inbox"){ var i=findInbox(d.id); if(i){ i.done=!i.done; render(); await saveRow("inbox_items",i.id,{done:i.done}); } return; }
  if(a==="del-inbox"){ S.priv.inbox=S.priv.inbox.filter(function(x){return x.id!==d.id;}); render(); await deleteRow("inbox_items",d.id); return; }

  // clientes
  if(a==="estado"){ await patchClient(d.scope,d.id,{estado:d.e}); return; }
  if(a==="cycle"){ var c=findClient(d.scope,d.id); if(c){ var patch=(c.ciclo==="por-entregar")?{ciclo:"entregado",estado:"bien"}:{ciclo:"por-entregar",pagado:true}; await patchClient(d.scope,d.id,patch); } return; }
  if(a==="vis"){ var cv=findClient(d.scope,d.id); if(cv){ var nv=Math.max(0,Math.min(cv.visitasTotal,cv.visitasHechas+(d.dir==="1"?1:-1))); await patchClient(d.scope,d.id,{visitasHechas:nv}); } return; }
  if(a==="quick"){ var cq=findClient(d.scope,d.id); if(cq){ var patch2=(cq.tipo==="paquete"&&cq.ciclo==="por-entregar")?{ciclo:"entregado",estado:"bien"}:{estado:"bien"}; await patchClient(d.scope,d.id,patch2); } return; }
  if(a==="confirm-visit"){
    var cvc=findClientAny(d.cid), cve=findAgenda(d.eid);
    if(cve){ cve.contada=true; }
    var nuevo=null;
    if(cvc){ nuevo=Math.min(cvc.visitasTotal, cvc.visitasHechas+1); cvc.visitasHechas=nuevo; }
    render();
    if(cve) await saveRow("agenda", d.eid, { contada:true });
    if(cvc) await saveRow("clientes", d.cid, { visitas_hechas:nuevo });
    return;
  }
  if(a==="del-client"){ S.priv.clientes=S.priv.clientes.filter(function(x){return x.id!==d.id;}); S.cliOpen=false; S.editing=null; render(); await deleteRow("clientes",d.id); return; }
  if(a==="add-client"){ addNewClient(); return; }
  if(a==="cli-open"){ S.cliOpen=true; S.cliScope=d.scope; S.cliId=d.id; S.editing=null; render(); return; }
  if(a==="cli-close"){ S.cliOpen=false; S.editing=null; render(); return; }

  // edición inline
  if(a==="edit-start"){ S.editing={kind:d.kind,id:d.id,scope:d.scope||null}; render(); return; }
  if(a==="edit-cancel"){ S.editing=null; render(); return; }
  if(a==="edit-save"){ saveEdit(); return; }

  // agenda
  if(a==="week"){ S.weekOff+=(d.dir==="1"?1:-1); S.openDay=null; render(); return; }
  if(a==="week-today"){ S.weekOff=0; S.openDay=null; render(); return; }
  if(a==="coord-week"){ S.coordWeekOff+=(d.dir==="1"?1:-1); render(); return; }
  if(a==="coord-week-today"){ S.coordWeekOff=0; render(); return; }
  if(a==="day-add-open"){ S.openDay=d.key; render(); return; }
  if(a==="day-add-cancel"){ S.openDay=null; render(); return; }
  if(a==="day-add-save"){ addEntryToDay(d.key); return; }
  if(a==="del-agenda"){ S.priv.agenda=(S.priv.agenda||[]).filter(function(x){return x.id!==d.id;}); render(); await deleteRow("agenda",d.id); return; }
}

function onKey(e){
  if(e.key!=="Enter") return;
  var tg=e.target||{}, id=tg.id||"";
  if(tg.tagName==="TEXTAREA") return;
  if(id==="pw" || id==="email" || id==="wsname"){ submitLogin(); }
  else if(id==="add-rec"){ addRec(); }
  else if(id==="add-proj"){ addProj(); }
  else if(id==="capture"){ addInboxItem(); }
  else if(id==="cli-name"){ addNewClient(); }
  else if(id==="edit-input"){ saveEdit(); }
  else if(id && id.indexOf("ag-")===0){ if(S.openDay) addEntryToDay(S.openDay); }
  else if(id && id.indexOf("sub-")===0){ addSub(id.slice(4)); }
}

async function onChange(e){
  var t=e.target.closest("[data-act]"); if(!t) return;
  var a=t.getAttribute("data-act"), d=t.dataset;
  if(a==="set-proj-due"){ var p=findProj(d.id); if(p){ p.entrega=t.value; render(); await saveRow("proyectos",p.id,{entrega:t.value||null}); } }
  else if(a==="set-client-due"){ editClient(d.scope,d.id,{entrega:t.value}); render(); await saveRow("clientes",d.id,{entrega:t.value||null}); }
  else if(a==="bit-mat-texto"){ S.bitacora.materiales.materiales_texto=t.value; await saveBit("materiales"); }
  else if(a==="bit-cat-texto"){ S.bitacora.catalogos.acciones_texto=t.value; await saveBit("catalogos"); }
  else if(a==="bit-dis-cual"){ S.bitacora.disenos.placa_cual=t.value; await saveBit("disenos"); }
  else if(a==="bit-placa-nombre"){ var pi=+d.i; if(S.bitacora.disenos.placas[pi]){ S.bitacora.disenos.placas[pi].nombre=t.value; await saveBit("disenos"); } }
  else if(a==="bit-placa-file"){ var pf=t.files&&t.files[0]; if(pf){ await bitUploadPlaca(pf, +d.i); } }
  else if(a==="cal-ctx"){ if(!S.calCtx) S.calCtx={rubros:"",objetivos:"",reglas:"",tono:"",notas:""}; S.calCtx[d.k]=t.value; await saveContexto(); }
  else if(a==="cal-stock"){ S.calStockTexto=t.value; await saveStock(); render(); }
  else if(a==="cal-tema"){ S.calTema=t.value; await saveCalendarioDB(); }
  else if(a==="cal-daytema"){ var tdi=+d.di; if(S.calData[tdi]){ S.calData[tdi].tema_del_dia=t.value; var tres=await sb.from("cliente_calendario").upsert({cliente_id:S.calClienteId, dias:S.calData, tema:S.calTema}, {onConflict:"cliente_id"}); if(tres.error){ console.error(tres.error); showError("No se pudo guardar."); } } }
  else if(a==="cal-item"){ var cdi=+d.di, cii=+d.ii; if(S.calData[cdi] && S.calData[cdi].contenidos && S.calData[cdi].contenidos[cii]){ var cv=t.value; if(d.f==="momento" && cv==="") cv=null; S.calData[cdi].contenidos[cii][d.f]=cv; var cres=await sb.from("cliente_calendario").upsert({cliente_id:S.calClienteId, dias:S.calData}, {onConflict:"cliente_id"}); if(cres.error){ console.error(cres.error); showError("No se pudo guardar el calendario."); } } }
  else if(a==="um-carr-desc"){ if(S.umSel){ S.umSel.entregables.carruseles[+d.i].descripcion=t.value; await saveUmanaSel(); } }
  else if(a==="um-apedido-nota"){ if(S.umSel){ S.umSel.entregables.stories.a_pedido[+d.i].nota=t.value; await saveUmanaSel(); } }
  else if(a==="um-drive"){ if(S.umSel){ S.umSel.entregables.stories.drive_url=t.value; await saveUmanaSel(); render(); } }
  else if(a==="um-entrega"){ if(S.umSel){ S.umSel.fecha_entrega=t.value; render(); await saveUmanaSel(); } }
  else if(a==="um-upload"){ var uf=t.files&&t.files[0]; if(uf){ await umDoUpload(uf, d.campo); } }
  else if(a==="ahorro-field"){ S.ahorro[d.k]=parseFloat(t.value)||0; await saveAhorro(); render(); }
  else if(a==="boox-img"){ var bf=t.files&&t.files[0]; if(bf){ await booxUpload(bf); } }
}

document.addEventListener("click", onClick);
document.addEventListener("keydown", onKey);
document.addEventListener("change", onChange);

/* --------------------------------- init ----------------------------------- */
(async function init(){
  S.phase="loading"; render();
  try{
    var s=await sb.auth.getSession();
    if(s.data.session){
      S.user=s.data.session.user;
      await enterApp();
      return;
    }
  }catch(e){ console.error(e); }
  S.phase="login"; render();
})();
</script>
